<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <script>
      const whereAml = (lat, lng) => {
        const request = fetch(`https://geocode.xyz/${lat},${lng}?geoit=json`)
          .then((response) => {
            if (!response.ok) {
              throw new Error(`Http error! ${response.status}`);
            }

            return response.json();
          })
          .then((data) => {
            if (!data.city || !data.country) {
              throw new Error(
                "Invalid location data received from API, Error: Too many request per sencond",
              );
            }

            console.log(`Your are in ${data.city}, ${data.country}`);
          })
          .catch(function (error) {
            console.error("Error: ", error);
          });
      };

      whereAml(52.508, 13.381);
    </script>
  </body>
</html>
